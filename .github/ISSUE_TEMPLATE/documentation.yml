name: Documentation issue
description: Report missing, confusing, or outdated documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link or path, if known.
      placeholder: "README.md or docs/components/adaptive-select.md"
    validations:
      required: true
  - type: textarea
    id: unclear
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected improvement
      description: What should the documentation explain or show?
  - type: dropdown
    id: audience
    attributes:
      label: Audience
      options:
        - New user
        - Existing user
        - Contributor
        - Maintainer
        - Grant/reviewer
        - Other
