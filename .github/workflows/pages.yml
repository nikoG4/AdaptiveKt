name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Build Wasm distribution
      run: |
        chmod +x ./gradlew
        ./gradlew :admin-demo:wasmJsBrowserDistribution --console=plain --stacktrace
    
    - name: Prepare site content
      run: |
        mkdir -p public
        cp -r site/* public/
        
    - name: Integrate Wasm demo
      run: |
        mkdir -p public/demo/app
        cp -r admin-demo/build/dist/wasmJs/productionExecutable/* public/demo/app/
        echo "Wasm demo integrated at public/demo/app/"
    
    - name: List public directory
      run: |
        echo "=== Public directory structure ==="
        find public -type f -name "*.html" -o -name "*.js" | head -20
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'public'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
