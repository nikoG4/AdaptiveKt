name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Gradle
      shell: pwsh
      run: .\gradlew.bat build --console=plain --stacktrace
    
    - name: Prepare Pages site
      shell: pwsh
      run: .\tools\prepare-pages-site.ps1 -BasePath "/AdaptiveKt/"
    
    - name: List public directory
      shell: pwsh
      run: |
        Write-Host "=== site-dist directory structure ==="
        Get-ChildItem site-dist -Recurse -File | Select-Object -First 30 FullName
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'site-dist'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
