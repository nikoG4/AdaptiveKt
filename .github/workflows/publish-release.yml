name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: true
        type: string
      confirm:
        description: "Type PUBLISH to confirm"
        required: true
        type: string
      dryRunOnly:
        description: "Keep remote publishing disabled"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-local-test:
    name: Manual local publish preparation
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate user confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PUBLISH" ]; then
            echo "The confirm input must be exactly PUBLISH to continue."
            exit 1
          fi

      - name: Validate requested version matches project version
        run: |
          current=$(./gradlew properties --console=plain 2>/dev/null | grep '^version:' | awk '{print $2}')
          echo "Project version: $current"
          echo "Requested version: ${{ github.event.inputs.version }}"
          if [ "${{ github.event.inputs.version }}" != "$current" ]; then
            echo "Requested version does not match the project version. Update gradle.properties first."
            exit 1
          fi

      - name: Build
        run: ./gradlew build --console=plain --stacktrace

      - name: Publish to local test repository
        run: ./gradlew publishAllPublicationsToLocalTestRepository --console=plain --stacktrace

      - name: Run consumer smoke verification
        run: pwsh -NoProfile -NonInteractive -Command "Set-Location $PWD; .\tools\verify-local-publishing-consumer.ps1"

      - name: List local Maven artifacts
        run: |
          if [ -d build/local-maven ]; then
            find build/local-maven -type f | sort | sed -n '1,240p'
          else
            echo "build/local-maven not found"
            exit 1
          fi

      - name: Upload local Maven repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-maven-artifact
          path: build/local-maven/
          if-no-files-found: error
          retention-days: 7

      - name: Remote publish disabled
        run: |
          echo "Remote publishing is intentionally disabled in PUBLISH-1B."
          echo "This workflow prepares the build and local publishing artifacts, but does not publish to Maven Central."
          echo "PUBLISH-2 will enable real remote publishing after namespace and secrets are confirmed."
