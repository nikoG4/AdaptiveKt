name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      library: ${{ steps.filter.outputs.library }}
      ai_workspace: ${{ steps.filter.outputs.ai_workspace }}
      communication_suite: ${{ steps.filter.outputs.communication_suite }}
      visual: ${{ steps.filter.outputs.visual }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changed paths
      id: filter
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
        else
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [[ -z "$BASE" || "$BASE" =~ ^0+$ ]]; then
            BASE="$(git rev-list --max-parents=0 "$HEAD")"
          fi
        fi

        echo "Diff base: $BASE"
        echo "Diff head: $HEAD"
        git diff --name-only "$BASE" "$HEAD" | tee changed-files.txt

        changed() {
          local pattern="$1"
          grep -Eq "$pattern" changed-files.txt
        }

        LIBRARY_PATTERN='^(adaptive-core|adaptive-components|adaptive-layout|adaptive-navigation|adaptive-data|adaptive-forms|adaptive-feedback)/|^(build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat)$|^gradle/|^\.github/workflows/ci\.yml$'
        AI_WORKSPACE_PATTERN='^examples/ai-workspace-demo/|^(adaptive-core|adaptive-components|adaptive-layout|adaptive-navigation|adaptive-data|adaptive-forms|adaptive-feedback)/|^(build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat)$|^gradle/|^\.github/workflows/ci\.yml$'
        COMMUNICATION_SUITE_PATTERN='^examples/communication-suite-demo/|^(adaptive-core|adaptive-components|adaptive-layout|adaptive-navigation|adaptive-data|adaptive-forms|adaptive-feedback)/|^(build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat)$|^gradle/|^\.github/workflows/ci\.yml$'
        VISUAL_PATTERN='^(docs-site|admin-demo)/|^examples/(ai-workspace-demo|ecommerce-demo|communication-suite-demo)/|^tools/(prepare-pages-site|check-site-links|capture-|docs-site-capture/|^validate-)|^scripts/(verify-|check-)|^(adaptive-core|adaptive-components|adaptive-layout|adaptive-navigation|adaptive-data|adaptive-forms|adaptive-feedback)/|^(build.gradle.kts|settings.gradle.kts|gradle.properties|gradlew|gradlew.bat)$|^gradle/|^\.github/workflows/ci\.yml$'

        if changed "$LIBRARY_PATTERN"; then
          echo "library=true" >> "$GITHUB_OUTPUT"
        else
          echo "library=false" >> "$GITHUB_OUTPUT"
        fi

        if changed "$AI_WORKSPACE_PATTERN"; then
          echo "ai_workspace=true" >> "$GITHUB_OUTPUT"
        else
          echo "ai_workspace=false" >> "$GITHUB_OUTPUT"
        fi

        if changed "$COMMUNICATION_SUITE_PATTERN"; then
          echo "communication_suite=true" >> "$GITHUB_OUTPUT"
        else
          echo "communication_suite=false" >> "$GITHUB_OUTPUT"
        fi

        if changed "$VISUAL_PATTERN"; then
          echo "visual=true" >> "$GITHUB_OUTPUT"
        else
          echo "visual=false" >> "$GITHUB_OUTPUT"
        fi

  build:
    name: Build library and core demos
    needs: changes
    if: needs.changes.outputs.library == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Run Gradle build
      run: |
        chmod +x ./gradlew
        ./gradlew build --console=plain --stacktrace

    - name: Build Wasm distribution
      run: |
        ./gradlew :docs-site:wasmJsBrowserDistribution --console=plain --stacktrace
        ./gradlew :admin-demo:wasmJsBrowserDistribution --console=plain --stacktrace

    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: "**/build/reports/"
        retention-days: 14

    - name: Upload Wasm distribution
      uses: actions/upload-artifact@v4
      with:
        name: wasm-distribution
        path: |
          docs-site/build/dist/wasmJs/productionExecutable/
          admin-demo/build/dist/wasmJs/productionExecutable/
        retention-days: 14

  ai-workspace-demo:
    name: Build AI Workspace demo
    needs: changes
    if: needs.changes.outputs.ai_workspace == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build AI Workspace Demo
      working-directory: examples/ai-workspace-demo
      run: |
        chmod +x ./gradlew
        ./gradlew build --console=plain
        ./gradlew desktopTest --console=plain
        ./gradlew wasmJsBrowserDistribution --console=plain

  communication-suite-demo:
    name: Build Communication Suite demo
    needs: changes
    if: needs.changes.outputs.communication_suite == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Communication Suite Demo
      working-directory: examples/communication-suite-demo
      run: |
        chmod +x ../../gradlew
        ../../gradlew build --console=plain --stacktrace
        ../../gradlew wasmJsBrowserDistribution --console=plain --stacktrace

  visual-artifacts:
    name: Capture visual validation artifacts
    needs: changes
    if: needs.changes.outputs.visual == 'true'
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Pages site
      shell: pwsh
      run: .\tools\prepare-pages-site.ps1

    - name: Capture AI Workspace screenshots
      shell: pwsh
      run: .\tools\capture-ai-workspace-premium.ps1 -SkipBuild

    - name: Check Docs Site Guards
      shell: pwsh
      run: .\scripts\check-docs-site-guards.ps1

    - name: Validate Component Routes
      shell: pwsh
      run: .\tools\validate-component-routes.ps1 -SkipBuild

    - name: Capture Component Gallery screenshots
      shell: pwsh
      run: .\tools\capture-component-gallery.ps1 -SkipBuild

    - name: Check Communication Suite Guards
      shell: pwsh
      run: .\scripts\check-communication-suite-guards.ps1

    - name: Validate Communication Suite Routes
      shell: pwsh
      run: .\tools\validate-communication-suite-routes.ps1 -SkipBuild

    - name: Capture Communication Suite screenshots
      shell: pwsh
      run: .\tools\capture-communication-suite.ps1 -SkipBuild

    - name: Upload AI Workspace screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-workspace-screenshots
        path: artifacts/screenshots/ai-workspace-premium-refactor/
        retention-days: 14

    - name: Upload Communication Suite screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: communication-suite-screenshots
        path: artifacts/screenshots/communication-suite/
        if-no-files-found: error
        retention-days: 14

    - name: Upload Communication Suite Route Validation
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: communication-suite-route-validation
        path: artifacts/route-validation/communication-suite/
        retention-days: 14

    - name: Upload Component Gallery screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: component-gallery-screenshots
        path: artifacts/screenshots/
        retention-days: 14

    - name: Upload Component Route Validation
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: component-route-validation
        path: artifacts/route-validation/
        retention-days: 14

    - name: Upload Pages preview site
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pages-site-dist-preview
        path: site-dist/
        retention-days: 7
