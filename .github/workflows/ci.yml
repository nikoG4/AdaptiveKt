name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Run Gradle build
      run: |
        chmod +x ./gradlew
        ./gradlew build --console=plain --stacktrace
    
    - name: Build Wasm distribution
      run: |
        ./gradlew :docs-site:wasmJsBrowserDistribution --console=plain --stacktrace
        ./gradlew :admin-demo:wasmJsBrowserDistribution --console=plain --stacktrace
    
    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: "**/build/reports/"
    
    - name: Upload Wasm distribution
      uses: actions/upload-artifact@v4
      with:
        name: wasm-distribution
        path: |
          docs-site/build/dist/wasmJs/productionExecutable/
          admin-demo/build/dist/wasmJs/productionExecutable/
