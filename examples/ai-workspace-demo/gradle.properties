kotlin.code.style=official
android.useAndroidX=true
kotlin.mpp.enableCInteropCommonization=true
kotlin.js.generate.executable.default=false
#WASM
kotlin.wasm.enableBytecodeOptimizer=true
#https://github.com/Kotlin/kotlin-wasm-examples/blob/main/compose-imageviewer/gradle.properties
#Suppressing compiler warning for disabling ios simulator arm64 
kotlin.native.ignoreDisabledTargets=true

# Memory tuning for Wasm compilation
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx3g
kotlin.incremental=true
org.gradle.parallel=true
org.gradle.caching=true
